name: YikYak Morning Digest

on:
  schedule:
    - cron: "0 13 * * *"   # 8:00 AM CST = 13:00 UTC
  workflow_dispatch:        # lets you trigger manually from GitHub UI

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          CHROMIUM_PATH=$(which chromium-browser || which chromium)
          CHROMEDRIVER_PATH=$(which chromedriver)
          echo "CHROME_BIN=$CHROMIUM_PATH" >> $GITHUB_ENV
          echo "CHROMEDRIVER_PATH=$CHROMEDRIVER_PATH" >> $GITHUB_ENV
          ln -sf $CHROMIUM_PATH /usr/local/bin/google-chrome

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python scraper.py
