services:
  - type: cron
    name: yikyak-digest
    runtime: python
    schedule: "0 13 * * *"   # 8:00 AM CST = 13:00 UTC
    buildCommand: |
      pip install -r requirements.txt
      apt-get install -y chromium chromium-driver
    startCommand: python scraper.py
    envVars:
      - key: GMAIL_USER
        sync: false          # enter manually in Render dashboard
      - key: GMAIL_PASS
        sync: false
      - key: TO_EMAIL
        sync: false
